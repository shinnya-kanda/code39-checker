<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Code39 突合</title>

<style>
body { font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif; margin:0; background:#f6f7f9;}
header { padding:12px 16px; background:#111827; color:#fff; font-weight:700;}
main { padding:14px 16px 90px; max-width:760px; margin:0 auto;}
.card { background:#fff; border-radius:14px; padding:14px; box-shadow:0 6px 20px rgba(0,0,0,.06); margin:12px 0;}
button{ border:0;border-radius:12px;padding:12px 14px;font-size:16px;font-weight:700;background:#111827;color:#fff;cursor:pointer;}
button.secondary{background:#374151;}
button.danger{background:#b91c1c;}
button:disabled{opacity:.5;}
video{width:100%;border-radius:14px;background:#000;}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:800;}
.ok{background:#dcfce7;color:#166534;}
.ng{background:#fee2e2;color:#991b1b;}
.wait{background:#e5e7eb;color:#111827;}
</style>
</head>

<body>

<header>Code39 突合（1回目=正解 / 2回目=照合）</header>

<main>

<div class="card">
<button id="btnStart">カメラ開始</button>
<button id="btnStop" class="secondary" disabled>停止</button>
<button id="btnReset" class="danger">リセット</button>
</div>

<div class="card">
<video id="video" playsinline></video>
</div>

<div class="card">
<div>状態：<span id="stateBadge" class="badge wait">待機</span></div>
<div>正解：<span id="expected">—</span></div>
<div>照合：<span id="actual">—</span></div>
<div style="font-weight:900;font-size:20px;">判定：<span id="result">—</span></div>
</div>

</main>

<!-- ZXing -->
<script src="./zxing.js"></script>

<script>
const FORMATS=[ZXing.BarcodeFormat.CODE_39];

let expected=null;
let codeReader=null;
let currentDeviceId=null;
let devices=[];

const btnStart=document.getElementById('btnStart');
const btnStop=document.getElementById('btnStop');
const btnReset=document.getElementById('btnReset');
const video=document.getElementById('video');
const elExpected=document.getElementById('expected');
const elActual=document.getElementById('actual');
const elResult=document.getElementById('result');
const elBadge=document.getElementById('stateBadge');

function setBadge(type,text){
elBadge.className='badge '+type;
elBadge.textContent=text;
}

function normalize(t){
return String(t||'').trim().toUpperCase();
}

function resetAll(){
expected=null;
elExpected.textContent='—';
elActual.textContent='—';
elResult.textContent='—';
setBadge('wait','待機');
}

async function startCamera(){

if(typeof ZXing==="undefined"){
alert("ZXingが読み込めていません。外部JSがブロックされています。");
return;
}

try{
await navigator.mediaDevices.getUserMedia({video:true});
}catch(e){
alert("カメラ権限エラー: "+e.name);
return;
}

codeReader=new ZXing.BrowserMultiFormatReader(
new Map([[ZXing.DecodeHintType.POSSIBLE_FORMATS,FORMATS]])
);

devices=await ZXing.BrowserCodeReader.listVideoInputDevices();

if(!devices.length){
alert("カメラが見つかりません");
return;
}

currentDeviceId=devices[0].deviceId;

btnStart.disabled=true;
btnStop.disabled=false;

await codeReader.decodeFromVideoDevice(
currentDeviceId,
video,
(result,err)=>{
if(result){
handleScan(result.getText());
}
}
);

setBadge('wait','正解をスキャン');
}

function handleScan(text){
const code=normalize(text);

if(!expected){
expected=code;
elExpected.textContent=code;
setBadge('wait','次に現品票をスキャン');
return;
}

elActual.textContent=code;

if(expected===code){
elResult.textContent="OK";
setBadge('ok','OK');
}else{
elResult.textContent="NG";
setBadge('ng','NG');
}

expected=null;

setTimeout(()=>{
resetAll();
},1500);
}

function stopCamera(){
if(codeReader){
codeReader.reset();
}
btnStart.disabled=false;
btnStop.disabled=true;
setBadge('wait','停止');
}

btnStart.onclick=startCamera;
btnStop.onclick=stopCamera;
btnReset.onclick=resetAll;

resetAll();
</script>

</body>

</html>
